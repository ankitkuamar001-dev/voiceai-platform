name: CD

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      
      - name: Check Staging Secret
        id: check_secret
        run: |
          if [ "${{ secrets.KUBE_CONFIG_STAGING }}" == "" ]; then
            echo "has_secret=false" >> $GITHUB_OUTPUT
            echo "KUBE_CONFIG_STAGING is missing! Skipping deployment."
          else
            echo "has_secret=true" >> $GITHUB_OUTPUT
          fi

      - name: Set Kubernetes Context
        if: steps.check_secret.outputs.has_secret == 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          
      - name: Deploy to Staging using Kustomize
        if: steps.check_secret.outputs.has_secret == 'true'
        working-directory: infra/k8s/overlays/staging
        run: |
          # Ensure kustomize is available
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          
          # Deploy
          kustomize build . | kubectl apply -f -

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        
      - name: Check Production Secret
        id: check_secret
        run: |
          if [ "${{ secrets.KUBE_CONFIG_PRODUCTION }}" == "" ]; then
            echo "has_secret=false" >> $GITHUB_OUTPUT
            echo "KUBE_CONFIG_PRODUCTION is missing! Skipping deployment."
          else
            echo "has_secret=true" >> $GITHUB_OUTPUT
          fi

      - name: Set Kubernetes Context
        if: steps.check_secret.outputs.has_secret == 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          
      - name: Deploy to Production using Kustomize
        if: steps.check_secret.outputs.has_secret == 'true'
        working-directory: infra/k8s/overlays/production
        run: |
          # Ensure kustomize is available
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          
          # Deploy
          kustomize build . | kubectl apply -f -
