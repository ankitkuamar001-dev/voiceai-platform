worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # ── Rate Limiting Zones ──
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=100r/m;
    limit_req_zone $http_x_api_key zone=api_per_key:10m rate=1000r/m;
    limit_conn_zone $binary_remote_addr zone=ws_per_ip:10m;

    # ── Request Body Size Limit ──
    client_max_body_size 10m;

    # ── Logging ──
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Upstream Services ──
    upstream ai_brain {
        server ai-brain:8001;
    }

    upstream auth_service {
        server auth-service:8002;
    }

    upstream ticket_service {
        server ticket-service:8003;
    }

    upstream analytics_service {
        server analytics-service:8004;
    }

    upstream notification_service {
        server notification-service:8005;
    }

    upstream whatsapp_service {
        server whatsapp-service:8006;
    }

    upstream voice_agent_api {
        server voice-agent:8000;
    }

    # ── Server Configuration ──
    server {
        listen 80;
        server_name _;

        # ── Security Headers ──
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Request-Id $request_id always;

        # ── CORS ──
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key, X-Request-ID" always;
        add_header Access-Control-Allow-Credentials true always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Health Check ──
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Auth Service ──
        location /api/v1/auth/ {
            limit_req zone=api_per_ip burst=20 nodelay;
            proxy_pass http://auth_service/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── AI Brain Service ──
        location /api/v1/ai/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://ai_brain/api/v1/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 60s;
        }

        # ── Ticket Service ──
        location /api/v1/tickets/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://ticket_service/api/v1/tickets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── Analytics Service ──
        location /api/v1/analytics/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://analytics_service/api/v1/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── WebSocket — Notification Service ──
        location /ws/ {
            limit_conn ws_per_ip 10;
            proxy_pass http://notification_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Conversations (via AI Brain) ──
        location /api/v1/conversations/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://ai_brain/api/v1/conversations/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── Knowledge Base (via AI Brain) ──
        location /api/v1/knowledge/ {
            limit_req zone=api_per_ip burst=20 nodelay;
            proxy_pass http://ai_brain/api/v1/knowledge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── WhatsApp Service ──
        location /api/v1/whatsapp/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://whatsapp_service/api/v1/whatsapp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        location /webhooks/whatsapp/ {
            proxy_pass http://whatsapp_service/webhooks/whatsapp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── Voice Agent API (Webhooks / Recordings) ──
        location /api/v1/recordings/ {
            proxy_pass http://voice_agent_api/api/v1/recordings/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        location /webhooks/twilio/ {
            proxy_pass http://voice_agent_api/webhooks/twilio/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }
    }
}
