apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  namespace: voiceai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-service
  template:
    metadata:
      labels:
        app: ticket-service
    spec:
      containers:
        - name: ticket-service
          image: voiceai/ticket-service:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: voiceai-config
            - secretRef:
                name: voiceai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-service
  namespace: voiceai
spec:
  selector:
    app: ticket-service
  ports:
    - port: 8003
      targetPort: 8003
