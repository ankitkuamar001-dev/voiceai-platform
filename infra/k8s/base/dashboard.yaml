apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: voiceai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: voiceai/dashboard:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: voiceai-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: voiceai
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
