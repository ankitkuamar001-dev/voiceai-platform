apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alerts
  labels:
    role: alert-rules
spec:
  groups:
  - name: PlatformAlerts
    rules:
    - alert: HighErrorRate
      expr: rate(http_requests_total{http_status=~"5.."}[5m]) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "High Error Rate detected on {{ $labels.endpoint }}"
        description: "The 5xx error rate is above 5% for the last 5 minutes."
    - alert: HighLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High Latency detected on {{ $labels.endpoint }}"
        description: "The 95th percentile latency is over 1 second for the last 5 minutes."
