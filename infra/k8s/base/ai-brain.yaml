apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-brain
  namespace: voiceai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-brain
  template:
    metadata:
      labels:
        app: ai-brain
    spec:
      containers:
        - name: ai-brain
          image: voiceai/ai-brain:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: voiceai-config
            - secretRef:
                name: voiceai-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-brain
  namespace: voiceai
spec:
  selector:
    app: ai-brain
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-brain-hpa
  namespace: voiceai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-brain
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
