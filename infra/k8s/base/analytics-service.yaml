apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: voiceai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: voiceai/analytics-service:latest
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: voiceai-config
            - secretRef:
                name: voiceai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: voiceai
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8004
      targetPort: 8004
